[neopixel HBB2_LED]
pin: hbb_2: gpio20
chain_count: 7
color_order: GRB
initial_RED: 1
initial_GREEN: 0
initial_BLUE: 0

[gcode_button key1]
pin: hbb_2: gpio25
press_gcode:
release_gcode:     
  SET_LED LED=HBB2_LED RED=1 GREEN=0 BLUE=0 INDEX=1  #TRANSMIT=0

